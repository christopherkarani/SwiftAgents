<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #1a1a1a;
      --bee-body: #FFD700;
      --bee-stripe: #000000;
      --bee-wing: rgba(173, 216, 230, 0.6);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0d1117;
        --text-color: #f0f6fc;
      }
    }
    .background { fill: var(--bg-color); transition: fill 0.3s; }
    .text {
      fill: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 800;
      font-size: 140px;
      letter-spacing: -2px;
      text-anchor: middle;
      dominant-baseline: middle;
      transition: fill 0.3s;
    }
    .bee { cursor: pointer; }
    .bee-body { fill: var(--bee-body); }
    .bee-stripe { stroke: var(--bee-stripe); stroke-width: 2.5; }
    .bee-wing { fill: var(--bee-wing); }
    .bee-eye { fill: #000; }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(5px, -10px) rotate(5deg); }
      50% { transform: translate(-5px, -15px) rotate(-5deg); }
      75% { transform: translate(-10px, -5px) rotate(2deg); }
    }
    
    @keyframes wing-flap {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.3); }
    }

    .bee-group { animation: float 6s ease-in-out infinite; }
    .wing { animation: wing-flap 0.1s ease-in-out infinite; transform-origin: center; }
    
    .bee-1 { animation-delay: 0s; }
    .bee-2 { animation-delay: -1.5s; }
    .bee-3 { animation-delay: -3s; }
    .bee-4 { animation-delay: -4.5s; }
  </style>
  
  <rect class="background" width="1200" height="400" rx="24" />
  
  <text x="600" y="200" class="text">Swarm</text>
  
  <!-- Bee Definition -->
  <defs>
    <g id="cute-bee">
      <g class="bee-group">
        <!-- Wings -->
        <ellipse class="bee-wing wing" cx="-8" cy="-8" rx="10" ry="6" transform="rotate(-20, -8, -8)" />
        <ellipse class="bee-wing wing" cx="-8" cy="8" rx="10" ry="6" transform="rotate(20, -8, 8)" />
        <!-- Body -->
        <ellipse class="bee-body" cx="0" cy="0" rx="16" ry="12" />
        <!-- Stripes -->
        <path class="bee-stripe" d="M -4 -11 L -4 11 M 4 -11 L 4 11" />
        <!-- Eye -->
        <circle class="bee-eye" cx="8" cy="-3" r="2" />
        <!-- Smile -->
        <path d="M 10 2 Q 12 4 10 6" fill="none" stroke="black" stroke-width="1" stroke-linecap="round" />
      </g>
    </g>
  </defs>

  <!-- Placing Bees -->
  <g transform="translate(250, 120) scale(0.8)" class="bee-1"><use href="#cute-bee" /></g>
  <g transform="translate(950, 150) scale(0.7)" class="bee-2"><use href="#cute-bee" /></g>
  <g transform="translate(350, 300) scale(0.9)" class="bee-3"><use href="#cute-bee" /></g>
  <g transform="translate(800, 80) scale(0.65)" class="bee-4"><use href="#cute-bee" /></g>
  <g transform="translate(1050, 280) scale(0.75)" class="bee-1"><use href="#cute-bee" /></g>
</svg>